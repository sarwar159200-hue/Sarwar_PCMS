name: Build Sarwar PCMS

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restore NuGet packages
        run: |
          $proj = Get-ChildItem -Path . -Recurse -Filter "*.vbproj" | Select-Object -First 1
          nuget restore $proj.FullName
        shell: pwsh

      - name: Build (Release / x86)
        run: |
          $proj = Get-ChildItem -Path . -Recurse -Filter "*.vbproj" | Select-Object -First 1
          msbuild $proj.FullName /p:Configuration=Release /p:Platform=x86
        shell: pwsh

      - name: Build (Release / x64)
        run: |
          $proj = Get-ChildItem -Path . -Recurse -Filter "*.vbproj" | Select-Object -First 1
          msbuild $proj.FullName /p:Configuration=Release /p:Platform=x64
        shell: pwsh

      - name: Assemble ready-to-install package (both bitnesses)
        shell: pwsh
        run: |
          $out = "Sarwar_PCMS_Package"
          New-Item -ItemType Directory -Path "$out\DLL Files\x86" -Force | Out-Null
          New-Item -ItemType Directory -Path "$out\DLL Files\x64" -Force | Out-Null

          function Assemble-Bitness($platformFolder, $xllPattern, $destFolder) {
            $binPath = Get-ChildItem -Path "." -Recurse -Filter $xllPattern |
              Where-Object { $_.FullName -like "*\$platformFolder\*" } | Select-Object -First 1
            if (-not $binPath) {
              Write-Error "Could not find $xllPattern under a $platformFolder build output folder."
              exit 1
            }
            Copy-Item $binPath.FullName "$destFolder\Sarwar_PCMS.xll" -Force
            $binDir = $binPath.DirectoryName

            $dnaFile = Get-ChildItem -Path $binDir -Filter "*.dna" | Select-Object -First 1
            if (-not $dnaFile) {
              Write-Error "No .dna file found in $binDir"
              exit 1
            }
            Copy-Item $dnaFile.FullName "$destFolder\Sarwar_PCMS.dna" -Force

            Get-ChildItem -Path $binDir -Filter "*.dll" | Copy-Item -Destination "$destFolder\" -Force

            if (Test-Path "$binDir\runtimes") {
              Copy-Item "$binDir\runtimes" "$destFolder\runtimes" -Recurse -Force
            }
          }

          Assemble-Bitness "x86" "Sarwar_PCMS*AddIn.xll" "$out\DLL Files\x86"
          Assemble-Bitness "x64" "Sarwar_PCMS*AddIn64.xll" "$out\DLL Files\x64"

          Copy-Item "Install.bat" "$out\" -Force
          Copy-Item "Uninstall.bat" "$out\" -Force
          Copy-Item "README.md" "$out\" -Force -ErrorAction SilentlyContinue

      - name: Upload ready-to-install package
        uses: actions/upload-artifact@v4
        with:
          name: Sarwar_PCMS_Ready_To_Install
          path: Sarwar_PCMS_Package/
